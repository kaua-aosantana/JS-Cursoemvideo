<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site com JS</title>
    <style>
        h1{
            color: rgb(255, 212, 22);
        }
        body{
            background-color: rgb(105, 105, 173);
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Estou livre da maldição! Simbora!</p>
    <script>
        /*
            Comentario em varias linhas WOW
        */
        window.alert("Isso é uma mensagem de alerta!")
        window.confirm("Essa é uma mensagem de confirmação") //tem botao OK e Cancelar
        window.prompt("Qual é o seu nome?") // deixa responder
    </script>
</body>
</html>
